name: academic_backend
description: "Backend API for Manager Academic"
version: 1.0.0

environment:
  sdk: ^3.1.0

dependencies:
  # Framework para criar o servidor web
  shelf: ^1.4.0
  # Gerenciador de rotas/URLs
  shelf_router: ^1.1.0
  # Permite que o Flutter Web consiga fazer chamadas para esta API sem bloqueios de segurança
  shelf_cors_headers: ^0.1.5
  # Driver para conectar no PostgreSQL
  postgres: ^3.1.1

dev_dependencies:
  lints: ^2.0.0