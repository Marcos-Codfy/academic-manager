# .github/workflows/ci.yml
name: Flutter CI/CD

# Dispara a esteira em Pull Requests para a branch main
on:
  pull_request:
    branches: [ "main" ]

jobs:
  test_and_coverage:
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instala o Flutter estável
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. Instala as dependências do projeto Flutter
      - name: Install dependencies
        run: flutter pub get

      # 4. Roda os testes gerando o relatório de cobertura (coverage/lcov.info)
      - name: Run tests with coverage
        run: flutter test --coverage

      # 5. Instala o lcov para poder ler o relatório
      - name: Install lcov
        run: sudo apt-get install -y lcov

      # 6. Valida se a cobertura é >= 75%
      - name: Check coverage threshold (75%)
        run: |
          SUMMARY=$(lcov --summary coverage/lcov.info 2>&1)
          echo "$SUMMARY"
          COVERAGE=$(echo "$SUMMARY" | grep -oP '\d+\.\d+(?=%)' | head -1)
          echo "Cobertura atual: ${COVERAGE}%"
          if [ -z "$COVERAGE" ]; then
            echo "Não foi possível extrair a cobertura. Verifique o arquivo lcov.info."
            exit 1
          fi
          if (( $(echo "$COVERAGE < 75.0" | bc -l) )); then
            echo "❌ Cobertura abaixo de 75%! PR bloqueado."
            exit 1
          fi
          echo "✅ Cobertura OK: ${COVERAGE}%"